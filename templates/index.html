<!DOCTYPE html>
<html>
<head>
    <title>Text to SQL Agent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin: 16px 0;
            border: 1px solid #ddd;
        }
        .card h3 {
            margin: 0 0 10px;
            color: #555;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sql-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 14px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            overflow-x: auto;
        }
        .results-block {
            font-family: monospace;
            font-size: 13px;
            white-space: pre;
            overflow-x: auto;
            color: #333;
        }
        .answer-block {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }
        .error-block {
            color: #dc2626;
            font-size: 15px;
        }
        .examples {
            margin: 10px 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .example-btn {
            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            color: #555;
        }
        .example-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
        }
        .loading {
            display: none;
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Text to SQL Agent</h1>
    <p style="color:#666">Ask questions about your Amazon store in plain English.</p>

    <div class="examples">
        <button class="example-btn" onclick="fillQuestion(this)">Who are the top customers?</button>
        <button class="example-btn" onclick="fillQuestion(this)">What is our total revenue?</button>
        <button class="example-btn" onclick="fillQuestion(this)">Best selling products?</button>
        <button class="example-btn" onclick="fillQuestion(this)">How many prime members?</button>
        <button class="example-btn" onclick="fillQuestion(this)">Revenue by category?</button>
    </div>

    <div class="search-box">
        <input type="text" id="question" placeholder="Ask a question about your data..." />
        <button onclick="askQuestion()">Ask</button>
    </div>
    <div class="loading" id="loading">Thinking...</div>

    <div id="results"></div>

    <script>
        function fillQuestion(btn) {
            document.getElementById('question').value = btn.textContent;
        }

        async function askQuestion() {
            const question = document.getElementById('question').value.trim();
            if (!question) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '';

            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();
            document.getElementById('loading').style.display = 'none';

            if (data.error) {
                document.getElementById('results').innerHTML = `
                    <div class="card">
                        <div class="error-block">${data.error}</div>
                    </div>`;
                return;
            }

            document.getElementById('results').innerHTML = `
                <div class="card">
                    <h3>Answer</h3>
                    <div class="answer-block">${data.answer}</div>
                </div>
                <div class="card">
                    <h3>SQL Generated</h3>
                    <div class="sql-block">${data.sql}</div>
                </div>
                <div class="card">
                    <h3>Raw Results</h3>
                    <div class="results-block">${data.table}</div>
                </div>`;
        }

        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') askQuestion();
        });
    </script>
</body>
</html>
